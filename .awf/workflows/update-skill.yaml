# .awf/workflows/update-skill.yaml
# Workflow to update a skill based on an upstream PR, for any skill declared
# in .awf/scripts/skill-map.json.
name: update-skill
version: "2.1.0"
description: Update a skill in this marketplace based on an upstream PR

inputs:
  - name: update_type
    type: string
    description: Type of update
    default: feature
    validation:
      enum: [feature, bugfix, breaking, docs]

  - name: repository
    type: string
    description: Upstream repository uri (must be mapped in skill-map.json)
    required: true

  - name: pull_request
    type: string
    description: PR number from given repository
    required: true
    validation:
      pattern: "^[0-9]+$"

states:
  initial: resolve_skill

  resolve_skill:
    type: step
    description: Resolve target skill from repository {{.inputs.repository}}
    script_file: "{{.awf.scripts_dir}}/resolve-skill.sh"
    on_success: fetch_pr_content
    on_failure: {message: "Unknown repository {{.inputs.repository}}. Add it to .awf/scripts/skill-map.json."}

  fetch_pr_content:
    type: step
    description: Fetch PR content from {{.inputs.repository}}
    command: |
      gh pr view {{.inputs.pull_request}} \
        --repo {{.inputs.repository}} \
        --json title,body,files \
        --jq '"# " + .title + "\n\n" + .body + "\n\n## Files changed\n" + ([.files[].path] | join("\n"))'
    on_success: read_and_bump_version
    on_failure: {message: "Failed to fetch PR #{{.inputs.pull_request}} from {{.inputs.repository}}"}

  read_and_bump_version:
    type: step
    description: Read current plugin version and increment patch
    script_file: "{{.awf.scripts_dir}}/bump-version.sh"
    on_success: update_marketplace_version
    on_failure: {message: "Failed to read or bump version for skill {{.states.resolve_skill.Output}}"}

  update_marketplace_version:
    type: step
    description: Update plugin version in marketplace.json
    script_file: "{{.awf.scripts_dir}}/update-marketplace.sh"
    on_success: create_branch
    on_failure: {message: "Failed to update marketplace.json for {{.states.resolve_skill.Output}} to {{.states.read_and_bump_version.Output}}"}

  create_branch:
    type: step
    description: Create branch for skill update
    script_file: "{{.awf.scripts_dir}}/create-branch.sh"
    timeout: 30s
    on_success: execute_claude
    on_failure: {message: "Failed to create branch for {{.states.resolve_skill.Output}} PR #{{.inputs.pull_request}}"}

  execute_claude:
    type: agent
    description: Execute skill update with Claude
    provider: claude
    prompt_file: "{{.awf.prompts_dir}}/claude-skill-updater.md"
    options:
      model: sonnet
      allowedTools: "Read,Grep,Glob,Edit,Write,Bash,Task"
      dangerously_skip_permissions: true
    timeout: 600
    on_success: commit_and_pr
    on_failure: {message: "Claude agent failed to update {{.states.resolve_skill.Output}} skill documentation"}

  commit_and_pr:
    type: call_workflow
    description: Commit changes and create PR
    workflow: commit
    inputs:
      pr: true
    on_success: done
    on_failure: {message: "Failed to commit and create PR"}

  done:
    type: terminal
    status: success
    message: "Skill {{.states.resolve_skill.Output}} updated to version {{.states.read_and_bump_version.Output}} based on PR #{{.inputs.pull_request}}"
